name: Release

on:
  push:
    tags:
      - "mtg-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Fork-local release tag to build, for example mtg-v1.3.11"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            artifact_name: voquill-windows
          - name: Linux
            os: ubuntu-24.04
            artifact_name: voquill-linux
          - name: macOS
            os: macos-15
            artifact_name: voquill-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Validate fork-local release tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          fi
          case "$TAG" in
            mtg-v*) echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV" ;;
            *) echo "Release tags must use the mtg-v* fork-local namespace, got '$TAG'" >&2; exit 1 ;;
          esac

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            desktop-file-utils \
            file \
            glslc \
            libclang-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2t64 \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libpulse-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            squashfs-tools \
            appstream \
            wl-clipboard

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm cmake vulkan-sdk -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $vulkanRoot = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) {
            throw "Vulkan SDK install did not create C:\VulkanSDK"
          }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set short Cargo target directory
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            "CARGO_TARGET_DIR=C:\t" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "CARGO_TARGET_DIR=/tmp/voquill-target" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Cache Cargo (Windows)
        if: runner.os == 'Windows'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> C:\t

      - name: Cache Cargo (Linux)
        if: runner.os == 'Linux'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> /tmp/voquill-target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri:build

      - name: Build Tauri bundles (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri -- build --bundles deb,rpm

      - name: Build Tauri bundles (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri -- build --bundles app,dmg

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/nsis/*.exe
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: |
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/deb/*.deb
            ${{ env.CARGO_TARGET_DIR }}/release/bundle/rpm/*.rpm

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: ${{ env.CARGO_TARGET_DIR }}/release/bundle/dmg/*.dmg

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Validate fork-local release tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          fi
          case "$TAG" in
            mtg-v*) echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV" ;;
            *) echo "Release tags must use the mtg-v* fork-local namespace, got '$TAG'" >&2; exit 1 ;;
          esac

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: find release-artifacts -maxdepth 5 -type f -print

      - name: Generate checksums
        shell: bash
        run: |
          find release-artifacts -maxdepth 5 -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt
          cat release-artifacts/SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Voquill MTG ${{ env.RELEASE_TAG }}
          draft: true
          prerelease: false
          fail_on_unmatched_files: true
          files: release-artifacts/**/*
          body: |
            Fork-local Voquill release for the MTG-Thomas fork.

            This release intentionally uses the `mtg-v*` tag namespace so it is not confused with upstream Voquill tags.

            Windows artifacts are currently unsigned unless signing secrets are added later.
