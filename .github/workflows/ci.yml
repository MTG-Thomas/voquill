name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - "codex/**"
      - "mtg/**"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ runner.temp }}/voquill-target

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            desktop-file-utils \
            file \
            glslc \
            libclang-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2t64 \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            libpulse-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            squashfs-tools \
            appstream \
            wl-clipboard

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm cmake vulkan-sdk -y --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $vulkanRoot = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanRoot) {
            throw "Vulkan SDK install did not create C:\VulkanSDK"
          }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> ${{ env.CARGO_TARGET_DIR }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
